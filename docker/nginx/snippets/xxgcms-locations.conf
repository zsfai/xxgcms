client_max_body_size 50m;

location /back-x/ {
    proxy_pass http://admin-frontend:80/back-x/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ~* ^/back-x/fonts/(.+\.(ttf|woff|woff2|eot|otf))$ {
    proxy_pass http://admin-frontend:80/back-x/fonts/$1;
    access_log off;
    expires 30d;
    add_header Access-Control-Allow-Origin *;
}

location /api/ {
    include uwsgi_params;
    uwsgi_pass backend:8002;
}

location /media/ {
    alias /var/www/media/;
    expires 7d;
    access_log off;
}

location /static/ {
    alias /usr/share/nginx/html/website-static/;
    expires 30d;
    access_log off;
    add_header Cache-Control "public, immutable";
    error_page 404 = @website_static_uwsgi;
}

location @website_static_uwsgi {
    include uwsgi_params;
    uwsgi_pass website:8003;
}

location / {
    include uwsgi_params;
    uwsgi_pass website:8003;
}
