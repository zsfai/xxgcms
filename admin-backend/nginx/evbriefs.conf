server {
	listen 80;
	server_name www.evbriefs.com;
	index index.html;
	return 301 https://www.evbriefs.com$request_uri;
}

server {
    listen 443 ssl;
    server_name www.evbriefs.com;
    index index.html;
    #root /www/wwwroot/www.evbriefs.com/www;
	#HTTP_TO_HTTPS_END
    ssl_certificate    /www/wwwroot/cert/evbriefs/evbriefs.com.pem;
    ssl_certificate_key    /www/wwwroot/cert/evbriefs/evbriefs.com.key;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    error_page 497  https://$host$request_uri;
    #SSL-END
    
    #HTTP_TO_HTTPS_START
    #if ($host = 'www.evbriefs.com' ) {
    #    rewrite ^/(.*)$ https://www.evbriefs.com/$1 permanent;
    #}
    
    #ERROR-PAGE-START  错误页配置，可以注释、删除或修改
    error_page 404 /404.html;
    error_page 502 /404.html;
    #ERROR-PAGE-END
    
    #禁止访问的文件或目录
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }
		
	location /back-x {
		alias /www/wwwroot/xxgcms-admin-front;
		try_files $uri $uri/ /back-x/index.html;
	}

	location ~* ^/back-x/css/fonts/(.+\.(ttf|woff|woff2|eot|otf))$ {
		alias /www/wwwroot/xxgcms-admin-front/fonts/$1;
		access_log off;
		expires 30d;
		add_header Access-Control-Allow-Origin *;
		add_header Access-Control-Allow-Methods "GET, OPTIONS";
		add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range";
		add_header Access-Control-Expose-Headers "Content-Length,Content-Range";
	}
		
	location /api/ {
		alias	/www/wwwroot/xxgcms;
	   	uwsgi_pass	127.0.0.1:8002;
	   	include	uwsgi_params;
		uwsgi_param UWSGI_CHDIR /www/wwwroot/xxgcms;
        uwsgi_param UWSGI_SCRIPT apps.wsgi;
	}
	
	location /wp-content {
       	alias    /www/wwwroot/static_files/evbriefs.com/wp-content;
	}
	
	location /media {
       	alias    /www/wwwroot/xxgcms/media;
	}
	
	location /static {
		alias	/www/wwwroot/xxgcms-web/www/static;
	}
    
	location ~ ^.+\.txt$ {
		root 	/www/wwwroot/xxgcms-web/static/;
	}
	
	location /sitemap {
		alias	/www/wwwroot/xxgcms/sitemap/www_evbriefs_com;
	}
	
	location /sitemap.xml {
		alias	/www/wwwroot/xxgcms/sitemap/www_evbriefs_com/sitemap.xml;
	}
	
	location / {
		alias	/www/wwwroot/xxgcms-web/www;
	   	uwsgi_pass	127.0.0.1:8003;
	   	include	uwsgi_params;
		uwsgi_param UWSGI_CHDIR /www/wwwroot/xxgcms-web/www;
        uwsgi_param UWSGI_SCRIPT evbriefs.apps.wsgi;
	}
	
}