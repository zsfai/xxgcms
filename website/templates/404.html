<!DOCTYPE html>
<html>
{% load static %}
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,inital-scale=1.0,user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="format-detection" content="telephone=no">
    <title>Lost, Welcome to Mars, 404 Error, Page Not Found</title>
    <meta name="keywords" content="404,404 Page"/>
    <meta name="description" content="Error 404. This is a 404 page, content not found"/>
    <style type="text/css">
        body {
            background: #000000 url({% static 'img/404bg.png' %}) center;
            background-size: cover;
            color: #ffffff;
            font-family: "Helvetica Neue", Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            width: 100%;
            height: 100%;
			overflow: hidden;
        }

        #wrapper {
            width: 100%;
            height: 100%;
            text-align: center;
            margin-top: 0;
        }

        h1 {
            font-size: 48px;
            font-weight: normal;
            padding: 0px 20px 5px;
            border-bottom: 2px solid #222222;
            display: inline-block;
            margin: 0px 0px 15px 0px;
        }

        h2 {
            font-size: 16px;
            font-weight: normal;
            margin: 0px 0px 30px 0px;
            text-transform: uppercase;
        }

        p {
            color: #707070;
        }

        a, a:active, a:visited, a:focus {
            text-decoration: none;
            color: #FFE90A;
        }

        @media only screen and (max-width: 640px) {
            html {
                width: 100%;
                overflow: hidden;
            }

            body {
                width: 100%;
                background-size: cover;
                overflow-x: hidden;
            }

            #wrapper {
                width: 100%;
                text-align: center;
                margin: auto;
                margin-top: -180px;
                overflow-x: hidden;

            }
        }
    </style>

</head>

<body>

<img src="{% static 'img/404earth.png' %}" alt="Earth"/>

<div id="wrapper">
    <h1>Error 404</h1>

    <h2>Page &nbsp;Not &nbsp;Found</h2>

    <p>Oops, Welcome to Mars</p>

    <div class="btn" style="margin-top: 10vh; margin-left: -14vw">
        <a href="/">&lt;&lt;==Return to Base</a>
    </div>

    <div class="btn" style="margin-top: 5vh;margin-right: -14vw">
        <a id="downlodLink" href="/">Request Rescue==&gt;&gt;</a>
    </div>
</div>
</body>
</html>
